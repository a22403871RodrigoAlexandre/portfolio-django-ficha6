<!-- portfolio/templates/portfolio/base.html -->
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #070711;
            --bg2: #0e0e1f;
            --card: rgba(255, 255, 255, 0.06);
            --card-hover: rgba(255, 255, 255, 0.10);
            --border: rgba(255, 255, 255, 0.12);
            --text: #f4f4ff;
            --muted: #9b9bb5;
            --accent: #8b5cf6;
            --accent2: #06b6d4;
            --danger: #fb7185;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(139, 92, 246, 0.25), transparent 35%),
                radial-gradient(circle at bottom right, rgba(6, 182, 212, 0.18), transparent 35%),
                linear-gradient(135deg, var(--bg), var(--bg2));
            color: var(--text);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 45px 45px;
            pointer-events: none;
            mask-image: linear-gradient(to bottom, black, transparent);
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            top: 20px;
            left: 20px;
            bottom: 20px;
            width: 250px;
            padding: 1.6rem;
            background: rgba(15, 15, 30, 0.75);
            border: 1px solid var(--border);
            border-radius: 24px;
            backdrop-filter: blur(18px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.35);
            overflow-y: auto;
            z-index: 10;
        }

        .sidebar-logo {
            display: inline-block;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            color: var(--text);
            text-decoration: none;
            margin-bottom: 0.4rem;
        }

        .sidebar-logo span {
            color: var(--accent2);
        }

        .sidebar-sub {
            color: var(--muted);
            font-size: 0.75rem;
            margin-bottom: 2rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .nav-section {
            color: var(--accent2);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            margin: 1.5rem 0 0.7rem;
        }

        nav a {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.75rem 0.85rem;
            border-radius: 14px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.25s ease;
        }

        nav a:hover {
            color: var(--text);
            background: linear-gradient(135deg, rgba(139,92,246,0.22), rgba(6,182,212,0.12));
            transform: translateX(4px);
        }

        nav a .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent);
        }

        /* MAIN */
        .main {
            margin-left: 300px;
            padding: 3rem;
            max-width: 1200px;
        }

        /* PAGE HEADER */
        .page-header {
            position: relative;
            margin-bottom: 3rem;
            padding: 2.5rem;
            border-radius: 28px;
            background: linear-gradient(135deg, rgba(139,92,246,0.18), rgba(6,182,212,0.10));
            border: 1px solid var(--border);
            box-shadow: 0 25px 70px rgba(0,0,0,0.30);
            overflow: hidden;
        }

        .page-header::after {
            content: "";
            position: absolute;
            width: 180px;
            height: 180px;
            right: -50px;
            top: -50px;
            background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 65%);
            border-radius: 50%;
        }

        .page-header h2 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 5vw, 4rem);
            line-height: 1;
            letter-spacing: -0.05em;
            margin-bottom: 0.8rem;
        }

        .page-header h2 span {
            color: var(--accent2);
        }

        .page-header p,
        .page-count {
            color: var(--muted);
            font-size: 0.95rem;
        }

        /* GRID */
        section.grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.4rem;
        }

        article.card {
            position: relative;
            padding: 1.4rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            backdrop-filter: blur(14px);
            box-shadow: 0 18px 45px rgba(0,0,0,0.25);
            overflow: hidden;
            transition: 0.25s ease;
            animation: fadeUp 0.5s ease both;
        }

        article.card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(139,92,246,0.18), transparent 45%);
            opacity: 0;
            transition: 0.25s ease;
        }

        article.card:hover {
            transform: translateY(-6px);
            border-color: rgba(139,92,246,0.55);
            background: var(--card-hover);
        }

        article.card:hover::before {
            opacity: 1;
        }

        article.card > * {
            position: relative;
            z-index: 1;
        }

        article.card header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        article.card header img {
            width: 58px;
            height: 58px;
            border-radius: 16px;
            object-fit: cover;
            margin-bottom: 0.9rem;
            border: 1px solid var(--border);
        }

        article.card header h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.25rem;
            margin-bottom: 0.35rem;
        }

        article.card header p {
            color: var(--muted);
            font-size: 0.9rem;
        }

        article.card section h4 {
            color: var(--accent2);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            margin-bottom: 0.7rem;
        }

        article.card section p {
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.7;
        }

        ul.tag-list {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        ul.tag-list li,
        .badge {
            display: inline-block;
            padding: 0.35rem 0.7rem;
            border-radius: 999px;
            background: rgba(139,92,246,0.16);
            color: var(--text);
            border: 1px solid rgba(139,92,246,0.35);
            font-size: 0.78rem;
        }

        ul.plain-list {
            list-style: none;
        }

        ul.plain-list li {
            padding: 0.55rem 0;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }

        ul.plain-list li:last-child {
            border-bottom: none;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* FOOTER */
        footer {
            margin-left: 300px;
            padding: 2rem 3rem;
            color: var(--muted);
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
        }

        /* RESPONSIVE */
        @media (max-width: 850px) {
            .sidebar {
                position: relative;
                top: auto;
                left: auto;
                bottom: auto;
                width: auto;
                margin: 1rem;
            }

            .main,
            footer {
                margin-left: 0;
                padding: 1.2rem;
            }

            nav {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
                gap: 0.4rem;
            }

            .page-header {
                padding: 1.8rem;
            }

            footer {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>
</head>

<body>

<aside class="sidebar">
    <a href="{% url 'licenciaturas' %}" class="sidebar-logo">
        port<span>.</span>folio
    </a>

    <p class="sidebar-sub">Django App</p>

    <p class="nav-section">Académico</p>
    <nav>
        <a href="{% url 'licenciaturas' %}"><span class="dot"></span>Licenciaturas</a>
        <a href="{% url 'docentes' %}"><span class="dot"></span>Docentes</a>
        <a href="{% url 'ucs' %}"><span class="dot"></span>Unidades Curriculares</a>
    </nav>

    <p class="nav-section">Projetos</p>
    <nav>
        <a href="{% url 'projetos' %}"><span class="dot"></span>Projetos</a>
        <a href="{% url 'tfcs' %}"><span class="dot"></span>TFCs</a>
    </nav>

    <p class="nav-section">Skills</p>
    <nav>
        <a href="{% url 'tecnologias' %}"><span class="dot"></span>Tecnologias</a>
        <a href="{% url 'competencias' %}"><span class="dot"></span>Competências</a>
        <a href="{% url 'formacoes' %}"><span class="dot"></span>Formações</a>
    </nav>
</aside>

<main class="main">
    {% block content %}
    {% endblock %}
</main>

<footer>
    <span>portfolio &copy; 2026</span>
    <span>Desenvolvido em Django</span>
</footer>

</body>
</html>
