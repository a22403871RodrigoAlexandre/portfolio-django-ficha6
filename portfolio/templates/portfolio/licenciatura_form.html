{% extends "portfolio/base.html" %}

{% block content %}

<div class="page-header">
    <div>
        <h2>Licenciatura<span>.</span></h2>
        <p>Criar ou editar licenciatura.</p>
    </div>
</div>

<form method="POST" enctype="multipart/form-data" class="card" style="padding: 1.5rem;">
    {% csrf_token %}

    {{ form.as_p }}

    <br>

    <button type="submit" class="badge" style="cursor:pointer;">
        Guardar
    </button>

    <a href="{% url 'licenciaturas' %}" class="badge" style="text-decoration:none;">
        Cancelar
    </a>
</form>

{% endblock %}
